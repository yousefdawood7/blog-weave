apiVersion: v1
kind: Service
metadata:
  name: posts-srv

spec:
  type: NodePort
  selector:
    app: posts

  ports:
    - name: posts
      protocol: TCP
      port: 4000
      targetPort: 4000
      nodePort: 30007
---
apiVersion: v1
kind: Service
metadata:
  name: posts-cluster-ip-srv

spec:
  selector:
    app: posts

  ports:
    - name: posts
      protocol: TCP
      port: 4000
      targetPort: 4000
