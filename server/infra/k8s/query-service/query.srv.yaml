apiVersion: v1
kind: Service
metadata:
  name: query-cluster-api-srv

spec:
  selector:
    app: query

  ports:
    - name: query
      port: 4002
      targetPort: 4002

---
apiVersion: v1
kind: Service
metadata:
  name: query-node-port-srv

spec:
  type: NodePort
  selector:
    app: query

  ports:
    - name: query
      port: 4002
      targetPort: 4002
      nodePort: 30009
